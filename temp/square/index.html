<!doctype html>
<html>
<head>
<style>

	html, body {
		margin: 0px;
		padding: 0px;
		height: 100%;
	}

	#footer {
		position: fixed;
		bottom: 0px;
		background-color: #dddddd;
		height: 100px;
		width: 100%;
	}

	.square {
		position: absolute;
		background-color: #336699;
		height: 50px;
		width: 50px;
		top: -25px;
		-ms-transform: rotate(45deg);
		-webkit-transform: rotate(45deg);
		transform: rotate(45deg);
		color: #ffffff;
	}

	#square1 {
		left: 100px;
	}

	#square2 {
		left: 200px;
	}

</style>
</head>
<body>

<div id="footer">
	<div class="square" id="square1">
		test
	</div>
	<div class="square" id="square2">
		test
	</div>
</div>

</body>
</html>
