<!doctype html>
<html ng-app="app">
<head>
<!-- bower:css -->
<link rel="stylesheet" href="bower_components/bootstrap/dist/css/bootstrap.css" />
<link rel="stylesheet" href="bower_components/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="bower_components/font-awesome/css/font-awesome.css" />
<!-- endbower -->
<link rel="stylesheet" href="css/style.css" />
</head>
<body ng-controller="MapController">

<leaflet id="map" layers="layers" center="world" defaults="defaults" geojson="geojson" geojson-nested="true"></leaflet>

<div id="search" class="container">
	<div class="input-group col-md-3">
		<input class="form-control" id="searchfield" ng-enter="fetch()" ng-model="species">
		<span class="input-group-btn">
			<button type="button" id="clearbutton" class="btn btn-default" ng-click="clear()">Clear</button>
		</span>
	</div>
</div>

<!-- bower:js -->
<script src="bower_components/jquery/dist/jquery.js"></script>
<script src="bower_components/bootstrap/dist/js/bootstrap.js"></script>
<script src="bower_components/angular/angular.js"></script>
<script src="bower_components/leaflet/dist/leaflet.js"></script>
<script src="bower_components/angular-leaflet-directive/dist/angular-leaflet-directive.js"></script>
<!-- endbower -->
<script src="bower_components/randomColor/randomColor.js"></script>
<script src="js/app.js"></script>
<script src="js/mapcontroller.js"></script>
<script src="js/gbifservice.js"></script>
</body>
